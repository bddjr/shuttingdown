name: Jobs

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        go-version:
          - "stable"
          - "1.23.0"
          - "1.22"
          - "1.11.0"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Test
        run: |
          go version
          go test

  test-1_8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.8.0"

      - name: Test
        run: |
          go version
          MODULE=$(awk '/^module / {print $2; exit}' go.mod)
          if [ -z "$MODULE" ]; then
            echo "Failed to extract module path from go.mod"
            exit 1
          fi
          TARGET_DIR="$(go env GOPATH)/src/$MODULE"
          mkdir -p "$(dirname "$TARGET_DIR")"
          ln -s "$PWD" "$TARGET_DIR"
          go test
